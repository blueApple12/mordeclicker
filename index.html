<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>מרדכי קליקר</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }

        body {
            background: linear-gradient(45deg, #ff00ff, #00ffff, #ff0000, #ffff00);
            background-size: 400% 400%;
            animation: brainrotBg 5s ease infinite;
            color: #ffffff;
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Comic Neue', sans-serif;
            margin: 0; padding: 0;
            min-height: 100vh;
            overflow-x: hidden;
        }
        @keyframes brainrotBg {
            0%   { background-position: 0% 50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        #game-wrapper {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        @media (min-width: 768px) {
            #game-wrapper { flex-direction: row; height: 100vh; overflow: hidden; }
        }

        #main-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1rem 1rem 0.5rem;
            position: relative;
        }

        #shop-panel {
            width: 100%;
            background: rgba(0,0,0,0.85);
            border-top: 6px solid #00FFFF;
            box-shadow: 0 0 30px #00FFFF;
        }
        @media (min-width: 768px) {
            #shop-panel {
                width: 38%; min-width: 300px;
                border-top: none; border-left: 8px solid #00FFFF;
                overflow-y: auto; height: 100vh;
            }
        }

        .click-text {
            position: fixed;
            font-size: 1.8rem; font-weight: 900;
            color: #39FF14;
            text-shadow: 2px 2px 0 #000, -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000;
            pointer-events: none;
            animation: floatUpBrainrot 0.8s cubic-bezier(0.175,0.885,0.32,1.275) forwards;
            z-index: 500;
        }
        .click-img {
            position: fixed; width: 45px; height: 45px;
            border-radius: 20%; pointer-events: none;
            animation: spinUpImg 1s linear forwards; z-index: 490;
        }
        @keyframes floatUpBrainrot {
            0%   { transform: translateY(0) scale(0.5) rotate(-10deg); opacity: 1; }
            50%  { transform: translateY(-50px) scale(1.4) rotate(10deg); opacity: 1; }
            100% { transform: translateY(-140px) scale(1.8) rotate(-20deg); opacity: 0; }
        }
        @keyframes spinUpImg {
            0%   { transform: translateY(0) rotate(0deg) scale(1); opacity: 1; }
            100% { transform: translateY(-100px) rotate(720deg) scale(0); opacity: 0; }
        }

        #mordechai-btn {
            transition: all 0.1s; user-select: none;
            -webkit-user-drag: none; touch-action: manipulation; cursor: pointer;
        }
        #mordechai-btn:active {
            transform: scale(0.82) rotate(15deg);
            filter: hue-rotate(90deg) contrast(200%);
        }

        .crazy-upgrade { animation: epilepsyBg 0.2s infinite alternate, shake 0.1s infinite; border: 5px dashed #fff !important; }
        .crazy-text {
            font-size: 1.3rem !important; font-weight: 900;
            background: linear-gradient(to right, #ff0000,#ff7f00,#ffff00,#00ff00,#0000ff,#8b00ff);
            -webkit-background-clip: text; color: transparent;
            animation: rainbow 0.5s linear infinite; text-transform: uppercase;
        }
        @keyframes epilepsyBg {
            0%{background-color:#ff0000}25%{background-color:#00ff00}
            50%{background-color:#0000ff}75%{background-color:#ff00ff}100%{background-color:#ffff00}
        }
        @keyframes shake {
            0%{transform:translate(2px,2px) rotate(0deg)}25%{transform:translate(-2px,-2px) rotate(-2deg)}
            50%{transform:translate(-4px,0) rotate(2deg)}75%{transform:translate(4px,2px) rotate(0deg)}
            100%{transform:translate(2px,-2px) rotate(-2deg)}
        }
        @keyframes rainbow { to { background-position: 400vh; } }

        .neon-box {
            background: rgba(0,0,0,0.75);
            border: 3px solid #39FF14;
            box-shadow: 0 0 10px #39FF14, inset 0 0 8px #39FF14;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #111; }
        ::-webkit-scrollbar-thumb { background: #ff00ff; border-radius: 5px; }

        /* REBIRTH MODAL */
        #rebirth-modal {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.88); z-index: 1000;
            align-items: center; justify-content: center; padding: 1rem;
        }
        #rebirth-modal.show { display: flex; }
        .rebirth-inner {
            background: #111; border: 5px solid #FFD700;
            box-shadow: 0 0 40px #FFD700; border-radius: 20px;
            padding: 2rem 1.5rem; max-width: 460px; width: 100%;
            text-align: center; animation: rebirthPulse 1.5s ease-in-out infinite;
        }
        @keyframes rebirthPulse {
            0%,100%{box-shadow:0 0 40px #FFD700} 50%{box-shadow:0 0 90px #FFD700}
        }
        .rebirth-confirm-btn {
            background: linear-gradient(135deg,#FFD700,#FF8C00);
            color:#000; font-weight:900; font-size:1.2rem;
            border:none; border-radius:14px; padding:0.85rem 2rem;
            cursor:pointer; margin:0.4rem;
            font-family:'Comic Sans MS',sans-serif; touch-action:manipulation;
        }
        .rebirth-cancel-btn {
            background:#333; color:#fff; font-weight:900; font-size:1rem;
            border:2px solid #666; border-radius:14px; padding:0.65rem 1.5rem;
            cursor:pointer; margin:0.4rem;
            font-family:'Comic Sans MS',sans-serif; touch-action:manipulation;
        }

        /* RESET CONFIRM MODAL */
        #reset-modal {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.92); z-index: 1100;
            align-items: center; justify-content: center; padding: 1rem;
        }
        #reset-modal.show { display: flex; }
        .reset-inner {
            background: #1a0000; border: 5px solid #FF0000;
            box-shadow: 0 0 40px #FF0000; border-radius: 20px;
            padding: 2rem 1.5rem; max-width: 400px; width: 100%;
            text-align: center;
        }
        .reset-confirm-btn {
            background: #FF0000; color: #fff; font-weight: 900; font-size: 1.1rem;
            border: none; border-radius: 12px; padding: 0.8rem 1.8rem;
            cursor: pointer; margin: 0.4rem;
            font-family: 'Comic Sans MS', sans-serif; touch-action: manipulation;
        }
        .reset-cancel-btn {
            background: #333; color: #fff; font-weight: 900; font-size: 1rem;
            border: 2px solid #666; border-radius: 12px; padding: 0.65rem 1.5rem;
            cursor: pointer; margin: 0.4rem;
            font-family: 'Comic Sans MS', sans-serif; touch-action: manipulation;
        }

        /* Flash */
        #rebirth-flash {
            display: none; position: fixed; inset: 0;
            background: #FFD700; z-index: 2000; pointer-events: none;
            animation: flashOut 1.2s forwards;
        }
        @keyframes flashOut { 0%{opacity:1} 60%{opacity:0.7} 100%{opacity:0} }

        /* Buttons row */
        #rebirth-btn {
            background: linear-gradient(135deg,#FFD700,#FF8C00);
            color:#000; font-weight:900; border:none;
            border-radius:12px; padding:0.55rem 1.2rem;
            cursor:pointer; font-family:'Comic Sans MS',sans-serif;
            font-size:0.95rem; box-shadow:0 0 14px #FFD700;
            touch-action:manipulation; white-space:nowrap;
        }
        #rebirth-btn.disabled { filter:grayscale(1) brightness(0.45); cursor:not-allowed; box-shadow:none; }

        #reset-btn {
            background: rgba(180,0,0,0.7); color:#fff; font-weight:900;
            border: 2px solid #ff4444; border-radius:12px;
            padding:0.5rem 1rem; cursor:pointer;
            font-family:'Comic Sans MS',sans-serif; font-size:0.85rem;
            touch-action:manipulation; white-space:nowrap;
        }

        .prestige-badge {
            display:inline-block;
            background:linear-gradient(135deg,#FFD700,#FF8C00);
            color:#000; font-weight:900; border-radius:999px;
            padding:2px 12px; font-size:0.95rem; box-shadow:0 0 8px #FFD700;
        }

        #shop-scroll {
            max-height: 45vh; overflow-y: auto; padding: 0.75rem;
        }
        @media (min-width: 768px) {
            #shop-scroll { max-height: none; height: calc(100vh - 90px); overflow-y: auto; padding: 1rem; }
        }
    </style>
</head>
<body>

    { id:'ashkara', name:'אשכרה יובל', baseCost:750000, cost:750000, sps:10000, count:0, desc:'אשכרה? אשכרה!', crazy:false, rebirthRequired:2 },
    { id:'the_end_is_nir', name:'the end is nir', baseCost:1000000, cost:1000000, sps:20000, count:0, desc:'im inevitable.', crazy:false, rebirthRequired:2 },
    { id:'boom_boom', name:'בום בום רציני', baseCost:5000000, cost:5000000, sps:75000, count:0, desc:'לא בום סתמי. בום רציני. בום שמזיז קירות ומייצר שורה בכמויות שאינן חוקיות.', crazy:false, rebirthRequired:3 },
    { id:'who_is', name:'מי זה מרדכי?!?!?!?!?!?!?', baseCost:50000000, cost:50000000, sps:200000, count:0, desc:'קריסה מוחלטת של משוואות דיפרנציאליות לתוך חור שחור של שורה.', crazy:true, rebirthRequired:2 }
];

const formatNumber = n => Math.floor(n).toLocaleString(LOCALE);
const getRebirthThreshold = () => state.cheatMode ? 0 : Math.floor(1000 * Math.pow(4, state.prestigeCount));
const getNextMultiplier = () => parseFloat(Math.pow(1.25, state.prestigeCount + 1).toFixed(4));
const formatValue = value => state.cheatMode ? '∞' : formatNumber(value);



function setCheatMode(enabled) {
    state.cheatMode = enabled;
    if (enabled) {
        localStorage.setItem(CHEAT_STORAGE_KEY, '1');
        state.shora = 1e15;
        state.rebirthMultiplier = 999999;
        state.prestigeCount = 999;
        buildings.forEach(b => { b.count = 9999; b.cost = 0; });
        clickUpgrades.forEach(u => { u.count = 9999; u.cost = 0; });
    } else {
        localStorage.removeItem(CHEAT_STORAGE_KEY);
        state.shora = 0;
        state.prestigeCount = 0;
        state.rebirthMultiplier = 1;
        state.rebirthHistory = [];
        buildings.forEach(b => { b.count = 0; b.cost = b.baseCost; });
        clickUpgrades.forEach(u => { u.count = 0; u.cost = u.baseCost; });
    }
    calculateSPS();
    renderShop();
    updateDisplay();
    saveGame();
}

Object.defineProperty(window, 'cheat', {
    get() { return state.cheatMode; },
    set(v) { setCheatMode(v === true || v === 1 || v === 'true'); },
    configurable: true,
});

function updatePurchaseButton(button, enabled, activeClasses, inactiveClasses = []) {
    button.disabled = !enabled;
    button.classList.toggle('bg-gray-700', !enabled);
    button.classList.toggle('text-gray-400', !enabled);
    activeClasses.forEach(c => button.classList.toggle(c, enabled));
    inactiveClasses.forEach(c => button.classList.toggle(c, !enabled));
}

function updateDisplay() {
    elements.shoraDisplay.innerText = formatValue(state.shora);
    elements.spsDisplay.innerText = formatValue(state.shoraPerSecond * state.rebirthMultiplier);

    if (state.cheatMode) {
        elements.clickMultiplierDisplay.style.display = 'block';
        elements.clickMultVal.innerText = '∞';
    } else if (state.prestigeCount > 0) {
        elements.clickMultiplierDisplay.style.display = 'block';
        elements.clickMultVal.innerText = state.rebirthMultiplier.toFixed(2);
    } else {
        elements.clickMultiplierDisplay.style.display = 'none';
    }

    if (state.prestigeCount > 0 || state.cheatMode) {
        elements.prestigeBadge.style.display = 'inline-block';
        elements.prestigeCountDisplay.innerText = state.cheatMode ? '∞' : state.prestigeCount;
    } else {
        elements.prestigeBadge.style.display = 'none';
    }

    const threshold = getRebirthThreshold();
    const canRebirth = state.cheatMode || state.shora >= threshold;
    elements.rebirthBtn.classList.toggle('disabled', !canRebirth);
    elements.rebirthRequirementText.innerText = canRebirth
        ? '✅ מוכן!'
        : `צריך ${formatNumber(threshold)} שורה`;

    buildings.forEach(b => {
        const btn = document.getElementById(`buy-btn-${b.id}`);
        const cont = document.getElementById(`building-${b.id}`);
        const lockEl = document.getElementById(`lock-building-${b.id}`);
        if (!btn || !cont) return;
        const unlocked = state.cheatMode || state.prestigeCount >= (b.rebirthRequired || 0);
        const canAfford = state.cheatMode || state.shora >= b.cost;
        const ok = unlocked && canAfford;
        cont.classList.toggle('opacity-50', !ok);
        cont.classList.toggle('grayscale', !ok);
        if (lockEl) lockEl.style.display = unlocked ? 'none' : 'block';
        updatePurchaseButton(btn, ok, b.crazy ? ['bg-black', 'text-white'] : ['bg-[#39FF14]', 'text-black']);
    });

    clickUpgrades.forEach(u => {
        const btn = document.getElementById(`buy-upgrade-btn-${u.id}`);
        const cont = document.getElementById(`upgrade-${u.id}`);
        const lockEl = document.getElementById(`lock-upgrade-${u.id}`);
        if (!btn || !cont) return;
        const unlocked = state.cheatMode || state.prestigeCount >= (u.rebirthRequired || 0);
        const canAfford = state.cheatMode || state.shora >= u.cost;
        const ok = unlocked && canAfford;
        cont.classList.toggle('opacity-50', !ok);
        cont.classList.toggle('grayscale', !ok);
        if (lockEl) lockEl.style.display = unlocked ? 'none' : 'block';
        updatePurchaseButton(btn, ok, ['bg-[#FF00FF]', 'text-white']);
    });
}

function getEventPosition(event) {
    const point = event.touches?.[0] ?? event;
    return { x: point.clientX, y: point.clientY };
}

function handleClick(e) {
    e.preventDefault();
    const gain = state.cheatMode ? 999999 : state.shoraPerClick * state.rebirthMultiplier;
    if (!state.cheatMode) state.shora += gain;
    const { x, y } = getEventPosition(e);
    spawnClickText(x, y, gain);
    spawnMordechaiImg(x, y);
    updateDisplay();
}

elements.mordechaiBtn.addEventListener('mousedown', handleClick);
elements.mordechaiBtn.addEventListener('touchstart', handleClick, { passive: false });

function spawnClickText(x, y, gain) {
    const p = document.createElement('div');
    p.className = 'click-text';
    p.innerText = `+${state.cheatMode ? '∞' : formatNumber(gain)}`;
    p.style.left = `${x + (Math.random() - 0.5) * 80}px`;
    p.style.top = `${y - 30 + (Math.random() - 0.5) * 60}px`;
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 800);
}

function spawnMordechaiImg(x, y) {
    const img = document.createElement('img');
    img.src = 'mordechai.png';
    img.className = 'click-img';
    img.onerror = () => img.remove();
    img.style.left = `${x - 22 + (Math.random() - 0.5) * 80}px`;
    img.style.top = `${y - 22 + (Math.random() - 0.5) * 60}px`;
    document.body.appendChild(img);
    setTimeout(() => img.remove(), 1000);
}

function renderShop() {
    elements.upgradesContainer.innerHTML = '';
    elements.buildingsContainer.innerHTML = '';

    clickUpgrades.forEach((u, i) => {
        const card = document.createElement('div');
        card.id = `upgrade-${u.id}`;
        card.style.cssText = 'background:#222;border-radius:14px;padding:12px;display:flex;flex-direction:column;gap:8px;border:2px solid #FF00FF;transition:all 0.2s';
        const req = u.rebirthRequired || 0;
        card.innerHTML = `
            <div style="display:flex;justify-content:space-between;align-items:flex-start">
                <div>
                    <div style="font-size:1rem;font-weight:900;color:#fff">${u.name}</div>
                    <div style="font-size:0.8rem;font-weight:700;color:#FF00FF">+${u.boost} לקליק</div>
                    ${req > 0 ? `<div id="lock-upgrade-${u.id}" style="font-size:0.75rem;color:#FFD700;font-weight:900">🔒 צריך ${req} גבינה${req > 1 ? 'ות' : ''}</div>` : `<div id="lock-upgrade-${u.id}" style="display:none"></div>`}
                </div>
                <div style="font-size:1.8rem;font-weight:900;color:#fff;background:rgba(0,0,0,0.5);border:2px solid #FF00FF;padding:2px 10px;border-radius:10px">${state.cheatMode ? '∞' : u.count}</div>
            </div>
            <div style="font-size:0.75rem;font-weight:700;color:#bbb;font-style:italic">"${u.desc}"</div>
            <button id="buy-upgrade-btn-${u.id}" onclick="buyClickUpgrade(${i})"
                style="width:100%;padding:10px 12px;border-radius:10px;font-weight:900;font-family:'Comic Sans MS',sans-serif;font-size:0.85rem;display:flex;justify-content:space-between;align-items:center;border:none;cursor:pointer;text-transform:uppercase;touch-action:manipulation">
                <span>קנה שדרוג קליק</span>
                <span style="background:#000;color:#00FFFF;padding:3px 8px;border-radius:6px;border:1px solid #00FFFF" dir="ltr">${formatNumber(u.cost)} שורה</span>
            </button>`;
        elements.upgradesContainer.appendChild(card);
    });

    buildings.forEach((b, i) => {
        const card = document.createElement('div');
        card.id = `building-${b.id}`;
        if (b.crazy) card.className = 'crazy-upgrade';
        card.style.cssText = 'background:#222;border-radius:14px;padding:12px;display:flex;flex-direction:column;gap:8px;border:2px solid #00FFFF;transition:all 0.2s';
        const req = b.rebirthRequired || 0;
        card.innerHTML = `
            <div style="display:flex;justify-content:space-between;align-items:flex-start">
                <div style="max-width:70%">
                    <div style="font-size:1rem;font-weight:900${b.crazy ? '' : ';color:#fff'}" ${b.crazy ? 'class="crazy-text"' : ''}>${b.name}</div>
                    <div style="font-size:0.8rem;font-weight:700;color:#00FFFF">+${b.sps.toLocaleString('en-US')} שורה/שנייה</div>
                    ${req > 0 ? `<div id="lock-building-${b.id}" style="font-size:0.75rem;color:#FFD700;font-weight:900">🔒 צריך ${req} גבינה${req > 1 ? 'ות' : ''}</div>` : `<div id="lock-building-${b.id}" style="display:none"></div>`}
                </div>
                <div style="font-size:1.8rem;font-weight:900;color:#fff;background:rgba(0,0,0,0.5);border:2px solid #fff;padding:2px 10px;border-radius:10px">${state.cheatMode ? '∞' : b.count}</div>
            </div>
            <div style="font-size:0.75rem;font-weight:700;color:#bbb;font-style:italic">"${b.desc}"</div>
            <button id="buy-btn-${b.id}" onclick="buyBuilding(${i})"
                style="width:100%;padding:10px 12px;border-radius:10px;font-weight:900;font-family:'Comic Sans MS',sans-serif;font-size:0.85rem;display:flex;justify-content:space-between;align-items:center;border:none;cursor:pointer;text-transform:uppercase;touch-action:manipulation">
                <span>קנה שורה פארם</span>
                <span style="background:#000;color:#FF00FF;padding:3px 8px;border-radius:6px;border:1px solid #FF00FF" dir="ltr">${formatNumber(b.cost)} שורה</span>
            </button>`;
        elements.buildingsContainer.appendChild(card);
    });

    renderRebirthHistory();
}

function renderRebirthHistory() {
    if (!state.rebirthHistory.length) {
        elements.rebirthHistorySection.style.display = 'none';
        return;
    }
    elements.rebirthHistorySection.style.display = 'block';
    elements.rebirthHistoryList.innerHTML = '';
    state.rebirthHistory.slice().reverse().forEach(entry => {
        const item = document.createElement('div');
        item.style.cssText = 'background:#1a1400;border:1px solid rgba(255,215,0,0.4);border-radius:10px;padding:10px;font-size:0.8rem;color:#FFD700';
        item.innerHTML = `<span style="font-weight:900">גבינה #${entry.prestige}</span>
            <span style="color:rgba(255,255,255,0.5);margin-right:6px"> — ${entry.totalShora.toLocaleString('en-US')} שורה collected</span>
            <span style="color:#FF8C00">×${entry.multiplierAfter.toFixed(2)} bonus</span>`;
        elements.rebirthHistoryList.appendChild(item);
    });
}

window.buyClickUpgrade = function(index) {
    const upgrade = clickUpgrades[index];
    if (!state.cheatMode && state.prestigeCount < (upgrade.rebirthRequired || 0)) return;
    if (!state.cheatMode && state.shora < upgrade.cost) return;
    if (!state.cheatMode) state.shora -= upgrade.cost;
    upgrade.count += 1;
    upgrade.cost = upgrade.baseCost * Math.pow(1.5, upgrade.count);
    calculateSPS();
    renderShop();
    updateDisplay();
};

window.buyBuilding = function(index) {
    const building = buildings[index];
    if (!state.cheatMode && state.prestigeCount < (building.rebirthRequired || 0)) return;
    if (!state.cheatMode && state.shora < building.cost) return;
    if (!state.cheatMode) state.shora -= building.cost;
    building.count += 1;
    building.cost = building.baseCost * Math.pow(1.15, building.count);
    calculateSPS();
    renderShop();
    updateDisplay();
    if (building.crazy) {
        document.body.style.animation = 'epilepsyBg 0.1s infinite alternate';
        setTimeout(() => { document.body.style.animation = 'brainrotBg 5s ease infinite'; }, 1000);
    }
};

function openRebirthModal() {
    if (!state.cheatMode && state.shora < getRebirthThreshold()) return;
    const next = getNextMultiplier();
    elements.rebirthModalText.innerHTML =
        `אתה מאבד את כל השורה, הפארמס, והשדרוגים...<br>
         <span style="color:#FFD700;font-size:1.4rem;font-weight:900">אבל תקבל ×${next.toFixed(2)} בונוס קבוע לכל דבר!</span><br>
         <small style="color:#aaa">(מכפיל קליקים, SPS — הכל!)</small>`;
    elements.rebirthModalCurrent.innerHTML =
        `גבינה <strong style="color:#FFD700">#${state.prestigeCount + 1}</strong> — יש לך כרגע ${state.cheatMode ? '∞' : formatNumber(state.shora)} שורה`;
    elements.rebirthModal.classList.add('show');
}

function closeRebirthModal() {
    elements.rebirthModal.classList.remove('show');
}

function confirmRebirth() {
    closeRebirthModal();
    state.rebirthHistory.push({
        prestige: state.prestigeCount + 1,
        totalShora: Math.floor(state.shora),
        multiplierAfter: getNextMultiplier(),
    });
    state.prestigeCount += 1;
    state.rebirthMultiplier = parseFloat(Math.pow(1.25, state.prestigeCount).toFixed(4));
    state.shora = 0;
    buildings.forEach(b => { b.count = 0; b.cost = b.baseCost; });
    clickUpgrades.forEach(u => { u.count = 0; u.cost = u.baseCost; });
    calculateSPS();
    renderShop();
    updateDisplay();
    saveGame();
    elements.rebirthFlash.style.display = 'block';
    setTimeout(() => { elements.rebirthFlash.style.display = 'none'; }, 1200);
}

function openResetModal() {
    elements.resetModal.classList.add('show');
}

function closeResetModal() {
    elements.resetModal.classList.remove('show');
}

function confirmFullReset() {
    closeResetModal();
    localStorage.removeItem(STORAGE_KEY);
    localStorage.removeItem(CHEAT_STORAGE_KEY);
    state.cheatMode = false;
    state.shora = 0;
    state.prestigeCount = 0;
    state.rebirthMultiplier = 1;
    state.rebirthHistory = [];
    buildings.forEach(b => { b.count = 0; b.cost = b.baseCost; });
    clickUpgrades.forEach(u => { u.count = 0; u.cost = u.baseCost; });
    calculateSPS();
    renderShop();
    updateDisplay();
}

function calculateSPS() {
    state.shoraPerSecond = buildings.reduce((sum, b) => sum + b.sps * b.count, 0);
    state.shoraPerClick = 1 + clickUpgrades.reduce((sum, u) => sum + u.boost * u.count, 0);
}

function saveGame() {
    const buildingsSaved = {};
    buildings.forEach(b => { buildingsSaved[b.id] = { count: b.count }; });
    const upgradesSaved = {};
    clickUpgrades.forEach(u => { upgradesSaved[u.id] = { count: u.count }; });
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
        shora: state.shora,
        prestigeCount: state.prestigeCount,
        rebirthMultiplier: state.rebirthMultiplier,
        rebirthHistory: state.rebirthHistory,
        buildingsCount: buildings.map(b => b.count),
        upgradesCount: clickUpgrades.map(u => u.count),
        buildingsSaved,
        upgradesSaved,
        cheatMode: state.cheatMode,
    }));
}

function loadGame() {
    if (localStorage.getItem(CHEAT_STORAGE_KEY) === '1') {
        state.cheatMode = true;
    }

    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) {
        calculateSPS();
        return;
    }

    try {
        const data = JSON.parse(raw);
        if (data.cheatMode) {
            state.cheatMode = true;
        } else {
            state.shora = data.shora || 0;
            state.prestigeCount = data.prestigeCount || 0;
            state.rebirthMultiplier = data.rebirthMultiplier || 1;
            state.rebirthHistory = data.rebirthHistory || [];
            if (Array.isArray(data.buildingsCount)) {
                buildings.forEach((b, index) => {
                    const saved = data.buildingsSaved
                        ? data.buildingsSaved[b.id]
                        : (index < data.buildingsCount.length ? { count: data.buildingsCount[index] } : null);
                    if (saved != null) {
                        b.count = saved.count !== undefined ? saved.count : saved;
                        b.cost = b.baseCost * Math.pow(1.15, b.count);
                    }
                });
            }
            if (Array.isArray(data.upgradesCount)) {
                clickUpgrades.forEach((u, index) => {
                    const saved = data.upgradesSaved
                        ? data.upgradesSaved[u.id]
                        : (index < data.upgradesCount.length ? { count: data.upgradesCount[index] } : null);
                    if (saved != null) {
                        u.count = saved.count !== undefined ? saved.count : saved;
                        u.cost = u.baseCost * Math.pow(1.5, u.count);
                    }
                });
            }
        }
    } catch (error) {
        console.warn('Failed to load save file:', error);
    }

    if (state.cheatMode) {
        state.shora = 1e15;
        state.rebirthMultiplier = 999999;
        state.prestigeCount = 999;
        buildings.forEach(b => { b.count = 9999; b.cost = 0; });
        clickUpgrades.forEach(u => { u.count = 9999; u.cost = 0; });
    }

    calculateSPS();
}

function initGame() {
    loadGame();
    renderShop();
    updateDisplay();
    setInterval(() => {
        if (!state.cheatMode) {
            state.shora += (state.shoraPerSecond / 10) * state.rebirthMultiplier;
        }
        updateDisplay();
    }, 100);
    setInterval(saveGame, 5000);
}

initGame();
</script>
</body>
</html>
